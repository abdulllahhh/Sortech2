services:
  api:
    build: 
      context: .     # Tell Docker to look in the API folder
      dockerfile: Presentation/Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=123456789
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=db;Database=TemplateDB;Username=dev_user;Password=dev_password
      - SendGrid__ApiKey=${SENDGRID_API_KEY:-""}
      - SendGrid__FromEmail=Abdullahibrahim.business@gmail.com
      - SendGrid__FromName=TemplateApp
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=dev_user
      - RabbitMQ__Password=dev_password
      - Redis__ConnectionString=redis://dev_user:dev_password@redis:6379/0
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__UserName=dev_user
      - Redis__Password=dev_password
      - JWT__Key=
      - JWT__Issuer=template
      - JWT__Audience=template
      - JWT__ExpirationMinutes=120
    volumes:
      - .:/app
      - /app/Presentation/bin
      - /app/Presentation/obj
      - /app/Infrastructure/bin
      - /app/Infrastructure/obj
      - /app/Domain/bin
      - /app/Domain/obj
      - /app/Application/bin
      - /app/Application/obj
      - C:\Users\babda\AppData\Roaming\ASP.NET\https:/https:ro
    working_dir: /app/Presentation     
    ports:
      - "8080:8080"
      - "8081:8081"
    